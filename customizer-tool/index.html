<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T-Shirt Customizer | Product Selection</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <h1>Choose Your Product</h1>
      <p>Select a blank apparel type and start customizing in seconds.</p>
    </div>
  </header>

  <main class="container product-page">
    <section class="product-grid" aria-label="Customizable products">
      <article class="product-card">
        <img src="assets/products/roundneck.png" alt="Round Neck T-Shirt">
        <div class="card-content">
          <h2>Round Neck T-Shirt</h2>
          <a class="btn btn-primary" href="customizer.html?product=roundneck">Customize</a>
        </div>
      </article>

      <article class="product-card">
        <img src="assets/products/polo.svg" alt="Polo T-Shirt">
        <div class="card-content">
          <h2>Polo T-Shirt</h2>
          <a class="btn btn-primary" href="customizer.html?product=polo">Customize</a>
        </div>
      </article>

      <article class="product-card">
        <img src="assets/products/oversized.svg" alt="Oversized T-Shirt">
        <div class="card-content">
          <h2>Oversized T-Shirt</h2>
          <a class="btn btn-primary" href="customizer.html?product=oversized">Customize</a>
        </div>
      </article>

      <article class="product-card">
        <img src="assets/products/hoodie.svg" alt="Hoodie">
        <div class="card-content">
          <h2>Hoodie</h2>
          <a class="btn btn-primary" href="customizer.html?product=hoodie">Customize</a>
        </div>
      </article>

      <article class="product-card">
        <img src="assets/products/jersey.svg" alt="Sports Jersey">
        <div class="card-content">
          <h2>Sports Jersey</h2>
          <a class="btn btn-primary" href="customizer.html?product=jersey">Customize</a>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
